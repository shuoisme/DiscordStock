name: 台股定時 Discord 通知

on:
  schedule:
    # 時間為 UTC，台灣時間 = UTC+8
    - cron: "30 0 * * 1-5"   # 台灣 08:30 — 早盤開盤
    - cron: "0 3 * * 1-5"    # 台灣 11:00 — 盤中觀察
    - cron: "0 5 * * 1-5"    # 台灣 13:00 — 午盤觀察
    - cron: "40 5 * * 1-5"   # 台灣 13:40 — 收盤總結
  workflow_dispatch:
    inputs:
      session:
        description: "場次 (morning / midday1 / midday2 / close)，留空自動判斷"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session (台灣時間)
        id: session
        run: |
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            echo "name=$INPUT" >> "$GITHUB_OUTPUT"
          else
            python3 - <<'PYEOF'
import os
from datetime import datetime, timezone, timedelta
TZ = timezone(timedelta(hours=8))
now = datetime.now(TZ)
t = now.hour * 60 + now.minute
if   t < 10 * 60:            s = "morning"
elif t < 12 * 60:            s = "midday1"
elif t < 13 * 60 + 20:       s = "midday2"
else:                         s = "close"
output_file = os.environ["GITHUB_OUTPUT"]
with open(output_file, "a") as f:
    f.write(f"name={s}\n")
print(f"Detected session: {s} (TWN {now.strftime('%H:%M')})")
PYEOF
          fi

      - name: Run Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py ${{ steps.session.outputs.name }}
