name: 台股定時 Discord 通知

on:
  schedule:
    # UTC times (台灣 = UTC+8)
    - cron: "30 0 * * 1-5"   # 08:30 TWN — 早盤開盤
    - cron: "0 3 * * 1-5"    # 11:00 TWN — 盤中觀察
    - cron: "0 5 * * 1-5"    # 13:00 TWN — 午盤觀察
    - cron: "40 5 * * 1-5"   # 13:40 TWN — 收盤總結
  workflow_dispatch:
    inputs:
      session:
        description: "場次 (morning / midday1 / midday2 / close)"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session
        id: session
        run: |
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            echo "name=$INPUT" >> "$GITHUB_OUTPUT"
          else
            python - <<'EOF'
import sys
from datetime import datetime, timezone, timedelta
TZ = timezone(timedelta(hours=8))
now = datetime.now(TZ)
t = now.hour * 60 + now.minute
if   t < 600:  s = "morning"
elif t < 720:  s = "midday1"
elif t < 800:  s = "midday2"
else:          s = "close"
with open("$GITHUB_OUTPUT", "a") as f:
    f.write(f"name={s}\n")
EOF
          fi

      - name: Run Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py ${{ steps.session.outputs.name }}
