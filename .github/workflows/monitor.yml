name: 台股定時 Discord 通知

on:
  schedule:
    # 時間為 UTC，台灣時間 = UTC+8
    - cron: "30 0 * * 1-5"   # 台灣 08:30 — 早盤開盤
    - cron: "0 3 * * 1-5"    # 台灣 11:00 — 盤中觀察
    - cron: "0 5 * * 1-5"    # 台灣 13:00 — 尾盤觀察
    - cron: "45 5 * * 1-5"   # 台灣 13:45 — 收盤總結
  workflow_dispatch:
    inputs:
      session:
        description: "場次 (morning / midday1 / midday2 / close)，留空自動判斷"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect session (台灣時間)
        id: session
        run: |
          INPUT="${{ github.event.inputs.session }}"
          if [ -n "$INPUT" ]; then
            SESSION="$INPUT"
          else
            TWN_HOUR=$(TZ='Asia/Taipei' date +%-H)
            TWN_MIN=$(TZ='Asia/Taipei' date +%-M)
            TWN_T=$((TWN_HOUR * 60 + TWN_MIN))
            echo "Taiwan time: ${TWN_HOUR}:${TWN_MIN} (${TWN_T} mins)"
            if [ "$TWN_T" -lt 600 ]; then
              SESSION="morning"
            elif [ "$TWN_T" -lt 720 ]; then
              SESSION="midday1"
            elif [ "$TWN_T" -lt 810 ]; then
              SESSION="midday2"
            else
              SESSION="close"
            fi
          fi
          echo "Session: $SESSION"
          echo "name=$SESSION" >> "$GITHUB_OUTPUT"

      - name: Run Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py ${{ steps.session.outputs.name }}
